components:
  schemas:
    AcademicYear:
      type: object
      description: Serializer for AcademicYear model.
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          readOnly: true
          description: Code court (ex. 2024-2025) - Auto-generated if not provided
        start_year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: Année de début (ex. 2024)
        end_year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: Année de fin (ex. 2025)
        is_current:
          type: boolean
          description: Année académique en cours
        status:
          allOf:
          - $ref: '#/components/schemas/AcademicYearStatusEnum'
          description: |-
            Statut de l'année académique

            * `DRAFT` - Draft
            * `ACTIVE` - Active
            * `ARCHIVED` - Archived
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - end_year
      - id
      - start_year
      - updated_at
    AcademicYearStatusEnum:
      enum:
      - DRAFT
      - ACTIVE
      - ARCHIVED
      type: string
      description: |-
        * `DRAFT` - Draft
        * `ACTIVE` - Active
        * `ARCHIVED` - Archived
    AdminUserCreate:
      type: object
      description: |-
        Input serializer for creating a user.

        Matches frontend CreateAdminUserInput.
      properties:
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
          maxLength: 20
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        is_active:
          type: boolean
          default: true
        is_staff:
          type: boolean
          default: false
      required:
      - first_name
      - last_name
