        name: start_year
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DRAFT
        description: |-
          Statut de l'année académique

          * `DRAFT` - Draft
          * `ACTIVE` - Active
          * `ARCHIVED` - Archived
