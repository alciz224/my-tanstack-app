      type: object
      description: Detail response with the generated password (create only).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          nullable: true
          title: Email address
          description: Email address for login and notifications.
        phone:
          type: string
          readOnly: true
          nullable: true
          description: Phone number in international format (+224...).
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Indicates if the account is active.
        is_staff:
          type: boolean
          readOnly: true
          title: Staff
          description: Can access Django admin.
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Last modified
        is_deleted:
          type: boolean
          readOnly: true
        profiles:
          allOf:
          - $ref: '#/components/schemas/UserProfiles'
          readOnly: true
        password:
          type: string
          readOnly: true
      required:
      - date_joined
      - email
      - first_name
      - id
      - is_active
      - is_deleted
      - is_staff
      - last_login
      - last_name
